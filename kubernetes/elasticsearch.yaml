# Single-node Elasticsearch, security disabled (xpack.security.enabled=false).
# This is intentionally the "simple setup" tradeoff: no TLS, no auth, no
# multi-node HA. It's reachable only inside the cluster (ClusterIP), so it's
# fine for a learning/dev environment - do not expose this Service outside
# the cluster without adding auth first.
#
# Heap/requests sized for a 2-node t3.small-class cluster (~1.42Gi
# allocatable per node) - confirmed live via `kubectl describe node`. The
# "normal" ES defaults (1g heap, 1.5Gi request) don't fit: that request
# alone exceeds a single node's total allocatable memory, so the pod sits
# Pending forever and cluster-autoscaler can't help (a same-type new node
# hits the identical ceiling). 512m heap leaves only a thin margin overall
# - fine for learning-platform log volume, but retune upward (and bump
# ES_JAVA_OPTS/limits together) if you resize the node group later.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: logging
  labels:
    app: elasticsearch
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      # A freshly provisioned EBS volume mounts owned by root, but the ES
      # container runs as uid 1000 - without this it can't write its own
      # node.lock file and crash-loops on "failed to obtain node locks"
      # (AccessDeniedException). fsGroup makes the volume group-writable
      # by the container's user at mount time.
      securityContext:
        fsGroup: 1000
      # ES touches vm.max_map_count at startup; EKS's default AMI value
      # (65530) is already high enough, but this initContainer makes the
      # manifest self-sufficient on a node group where it isn't.
      initContainers:
        - name: increase-vm-max-map-count
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          resources:
            requests:
              cpu: 250m
              memory: 700Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: logging
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
      name: http
  type: ClusterIP
