apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: logging
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.11.3
          args: ["-c", "/etc/filebeat.yml", "-e"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ELASTICSEARCH_HOST
              value: elasticsearch.logging.svc.cluster.local
            - name: ELASTICSEARCH_PORT
              value: "9200"
            - name: KIBANA_HOST
              value: kibana.logging.svc.cluster.local
            - name: KIBANA_PORT
              value: "5601"
          # filebeat.yml requires root:root ownership with no group/other
          # write bits, or it refuses to start ("config file must be owned
          # by the user identifier running Filebeat" / permission check) -
          # runAsUser 0 satisfies that; ConfigMap-mounted files are already
          # read-only.
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 100m
              # Real usage is ~41-46Mi (confirmed via `kubectl top`) - 100Mi
              # was starving metricbeat of scheduling room on the node that
              # also runs elasticsearch, where memory is already at ~95%
              # requested. 64Mi still leaves ~40% headroom over observed use.
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 200Mi
          volumeMounts:
            - name: config
              mountPath: /etc/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: data
              mountPath: /usr/share/filebeat/data
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: filebeat-config
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: data
          hostPath:
            path: /var/lib/filebeat-data
            type: DirectoryOrCreate
